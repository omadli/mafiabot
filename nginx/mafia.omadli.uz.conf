# /etc/nginx/sites-available/mafia.omadli.uz.conf
#
# Tashqi (host) nginx config — Mafia Bot (@MafGameUzBot)
# Frontend (React SPA) — document_root orqali static serve
# Backend — proxy_pass /api/, /webhook/, /ws/, /health
#
# SSL boshlang'ich versiyada YO'Q. `certbot --nginx -d mafia.omadli.uz`
# avtomatik qo'shadi (HTTP→HTTPS redirect ham).

server {
    listen 80;
    server_name mafia.omadli.uz;

    # React SPA (admin paneli + Telegram WebApp) — bitta build
    root /var/www/mafia;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml;

    # Static fayllar — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Telegram webhook
    location /webhook/ {
        proxy_pass http://127.0.0.1:8002/webhook/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 20M;
    }

    # WebSocket — real-time admin updates
    location /ws/ {
        proxy_pass http://127.0.0.1:8002/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Healthcheck (no logs)
    location /health {
        proxy_pass http://127.0.0.1:8002/health;
        access_log off;
    }

    # SPA fallback — React Router uchun (oxirida bo'lishi muhim)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Maksimal yuklov
    client_max_body_size 20M;

    # Logs
    access_log /var/log/nginx/mafia.access.log;
    error_log /var/log/nginx/mafia.error.log;
}
