name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: backend
        run: uv pip install --system -e ".[dev]"

      - name: Ruff check
        working-directory: backend
        run: ruff check .

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check .

      - name: MyPy
        working-directory: backend
        run: mypy app/ --ignore-missing-imports --no-strict-optional || true

      - name: Pytest
        working-directory: backend
        env:
          BOT_TOKEN: dummy:dummy
          BOT_USERNAME: TestBot
          WEBHOOK_SECRET: test-secret
          POSTGRES_PASSWORD: test
          SECRET_KEY: test-secret-key
          ADMIN_DEFAULT_PASSWORD: test-admin
          DATABASE_URL: "sqlite://./test.db"
          FSM_STORAGE: memory
          BOT_MODE: polling
          ENVIRONMENT: development
        run: pytest -v --tb=short || echo "No tests yet"

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci || npm install

      - name: Type check
        working-directory: frontend
        run: npm run type-check || echo "Type check warnings"

      - name: Build
        working-directory: frontend
        run: npm run build
